<!DOCTYPE html>
<html>
<head>
    <title>Event Registration Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Event Registration Portal</h1>
</header>

<section>
    <h2>Available Events</h2>

    <div class="card">
        <h3>Tech Fest 2026</h3>
        <p>Date: 15-06-2026</p>
        <button>Register</button>
    </div>

    <div class="card">
        <h3>AI Workshop</h3>
        <p>Date: 20-06-2026</p>
        <button>Register</button>
    </div>

    <div class="card">
        <h3>Coding Contest</h3>
        <p>Date: 25-06-2026</p>
        <button>Register</button>
    </div>
</section>

<section>
    <h2>Registration Form</h2>

    <form id="regForm">
        <input type="text" placeholder="Name" required>
        <input type="email" placeholder="Email" required>
        <input type="text" placeholder="College Name" required>

        <button type="submit">Submit</button>
    </form>
</section>

<section>
    <h2>About Project</h2>
    <p>
        This Event Registration Portal helps users
        view events and register online.
    </p>
</section>

<section>
    <h2>Contact</h2>
    <p>Email: admin@eventportal.com</p>
</section>

<script src="script.js"></script>

</body>
</html>
